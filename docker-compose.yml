services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aprim
      POSTGRES_PASSWORD: aprim
      POSTGRES_DB: aprim
    ports:
      - "5432:5432"
    volumes:
      - aprim_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aprim -d aprim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  aprim_pg:
